# 新弾フィーチャー投稿
# 毎日 JST 21:07（UTC 12:07）に実行。
# 運用ウィンドウ内（発売後7日以内）の新弾がある場合のみ投稿し、
# 期間外は Python 側で自動スキップする（YAML に日付ロジックを置かない）。
#
# 次回新弾でも追加設定は不要。pack_list.release_date が更新されると
# 自動的に新しい弾の投稿が始まり、8日目に自動停止する。

name: Post Featured Pack Movers

on:
  schedule:
    - cron: '7 12 * * *'  # 毎日 UTC 12:07 = JST 21:07
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'X投稿をスキップしてログのみ確認（チェックを入れると本番Xに投稿しない）'
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install requests supabase tweepy matplotlib beautifulsoup4

      - name: Post featured pack movers to X
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          X_POST_DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: python x_poster.py --featured
