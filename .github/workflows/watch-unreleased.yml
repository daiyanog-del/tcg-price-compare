# 未発売カード情報 Watcher
# 2時間毎（UTC 17分）に公式サイトを巡回し、新カード情報を Supabase に取り込む。
# 手動実行も可能 (Actions タブ → Watch Unreleased Cards → Run workflow)
#
# ポイント:
#   - pytest tests/test_fetch_guard.py が失敗した場合、巡回は実行しない（安全弁）
#   - anthropic パッケージはここでのみ pip install（Render側 requirements.txt は変更しない）

name: Watch Unreleased Cards

on:
  schedule:
    - cron: '17 */2 * * *'  # 2時間毎 UTC 0:17, 2:17, ... = JST 9:17, 11:17, ...
  workflow_dispatch:          # 手動実行ボタン

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt anthropic pytest

      - name: テスト実行（失敗したら巡回せず終了）
        run: pytest tests/test_fetch_guard.py -q

      - name: 未発売カード巡回
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXTRACTOR_MODEL: ${{ vars.EXTRACTOR_MODEL || 'claude-sonnet-4-6' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python watch_unreleased.py
