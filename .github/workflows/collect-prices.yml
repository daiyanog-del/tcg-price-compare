# 価格履歴データ収集
# 毎日 UTC 15:00 = 日本時間 0:00 に実行
# 手動実行も可能 (Actions タブ → Run workflow)

name: Collect Price History

on:
  schedule:
    - cron: '0 15 * * *'  # 毎日 UTC 15:00
  workflow_dispatch:       # 手動実行ボタン

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 supabase

      - name: Collect prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          KANABELL_CLOUD_ID: ${{ secrets.KANABELL_CLOUD_ID }}
          KANABELL_API_KEY: ${{ secrets.KANABELL_API_KEY }}
          KANABELL_INDEX: ${{ secrets.KANABELL_INDEX }}
        run: python collect_prices.py
