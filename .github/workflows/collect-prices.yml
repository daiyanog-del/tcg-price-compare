# 価格履歴データ収集
# 毎日 UTC 20:00 = 日本時間 5:00 に実行
# 手動実行も可能 (Actions タブ → Run workflow)

name: Collect Price History

on:
  schedule:
    - cron: '0 20 * * *'  # 毎日 UTC 20:00 = JST 5:00
  workflow_dispatch:       # 手動実行ボタン

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 supabase tweepy

      - name: Collect prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          KANABELL_CLOUD_ID: ${{ secrets.KANABELL_CLOUD_ID }}
          KANABELL_API_KEY: ${{ secrets.KANABELL_API_KEY }}
          KANABELL_INDEX: ${{ secrets.KANABELL_INDEX }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python collect_prices.py
