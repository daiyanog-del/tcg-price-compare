# 価格履歴データ収集
# 毎日 UTC 20:00 = 日本時間 5:00 に実行（X投稿は post-x.yml が担当）
# 手動実行も可能 (Actions タブ → Run workflow)

name: Collect Price History

on:
  schedule:
    - cron: '0 20 * * *'  # 毎日 UTC 20:00 = JST 5:00
  workflow_dispatch:       # 手動実行ボタン

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 supabase tweepy pywebpush

      - name: Collect prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          KANABELL_CLOUD_ID: ${{ secrets.KANABELL_CLOUD_ID }}
          KANABELL_API_KEY: ${{ secrets.KANABELL_API_KEY }}
          KANABELL_INDEX: ${{ secrets.KANABELL_INDEX }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DAILY_COLD_BUDGET: "3000"
          TIME_BUDGET_SEC: "18000"
        run: python collect_prices.py

      - name: Send push notifications
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
        run: python notify.py
