# 買取価格履歴データ収集
# 定期実行は Render Cron `tcg-collect-buyback`（JST 7:00 / crn-d8of5737uimc739hvsrg）へ移行済み。
# GitHub Actions のデータセンターIPでは カーナベル(buy_detail)=403・カードラッシュ到達不安定・遊々亭ブロック
# のためほぼ収集0件だったため、schedule を停止し手動実行（workflow_dispatch）のみ残す。
# （販売価格収集の Render 移行と同じ対応。詳細は collect_prices.py / 関連コミット参照）
# 手動実行: Actions タブ → Run workflow

name: Collect Buyback History

on:
  workflow_dispatch:       # 手動実行ボタンのみ（定期実行は Render Cron に一本化）

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 注目カードのみ収集のため販売(330分)より短く設定。実測後に調整

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 supabase

      - name: Collect buyback prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          KANABELL_CLOUD_ID: ${{ secrets.KANABELL_CLOUD_ID }}
          KANABELL_API_KEY: ${{ secrets.KANABELL_API_KEY }}
          KANABELL_INDEX: ${{ secrets.KANABELL_INDEX }}
        run: python collect_buyback.py
