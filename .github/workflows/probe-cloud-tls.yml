# 【使い捨て検証用】クラウドIP + curl_cffi(Chrome TLS署名偽装) で
# yu-gi-oh.jp に到達できるか確認するワンショットジョブ。
# 目的: 403の原因がTLSフィンガープリントのみか、クラウドIPブロックも併存するかの切り分け。
# 手動実行専用（schedule なし）。結果確認後にこのファイルは削除する。
name: Probe Cloud TLS (throwaway)

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install curl_cffi
        run: pip install curl_cffi

      - name: Probe yu-gi-oh.jp from cloud IP
        run: |
          python - <<'PY'
          from curl_cffi import requests as cr
          url = "https://yu-gi-oh.jp/"

          # 比較用: 素のクライアント（urllib）でも叩いてみる
          import urllib.request
          try:
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=20) as r:
                  print(f"urllib(plain): {r.status} len={len(r.read())}")
          except Exception as e:
              print(f"urllib(plain): ERROR {type(e).__name__} {e}")

          # 本命: Chrome の TLS/HTTP2 署名を偽装
          try:
              r = cr.get(url, impersonate="chrome", timeout=20)
              print(f"curl_cffi(chrome): {r.status_code} len={len(r.content)}")
              if r.status_code == 200:
                  print("RESULT: SUCCESS - cloud IP reachable with TLS impersonation")
              else:
                  print("RESULT: BLOCKED - status not 200")
          except Exception as e:
              print(f"curl_cffi(chrome): ERROR {type(e).__name__} {e}")
              print("RESULT: ERROR")
          PY
