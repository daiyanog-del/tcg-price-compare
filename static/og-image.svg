<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="TCGYM — 遊戯王OCG 総合プレイヤーサイト">
  <title>TCGYM — OGP</title>
  <rect width="1200" height="630" fill="#0a1024"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="#facc15" stroke-width="1" opacity="0.1"/>

  <!-- アイコン画像（mix-blend-mode:screenに相当: 黒背景が溶ける） -->
  <image href="/static/tcgym-icon.png" x="30" y="-30" width="420" height="690"
         preserveAspectRatio="xMidYMid meet"
         style="mix-blend-mode:screen"/>

  <!-- TCGYM テキスト -->
  <text x="480" y="310" font-size="200" font-weight="900"
        font-family="'Arial Black',Impact,system-ui,sans-serif"
        letter-spacing="-4">
    <tspan fill="#ffffff">TC</tspan><tspan fill="#facc15" font-size="240" dy="-20">G</tspan><tspan fill="#ffffff" dy="20">YM</tspan>
  </text>

  <!-- 副題 -->
  <text x="488" y="390" fill="#94a3b8" font-size="28" letter-spacing="7"
        font-weight="700" font-family="system-ui,sans-serif">遊戯王OCG 総合プレイヤーサイト</text>
</svg>
