<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊戯王OCG 価格比較</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #0c0e14;
  --bg-card:    #141620;
  --bg-hover:   #1a1d2a;
  --bg-input:   #161824;
  --border:     #262838;
  --border-hl:  #4a7cff;
  --text:       #d8dae0;
  --text-m:     #8a8ca0;
  --text-d:     #555670;
  --accent:     #4a7cff;
  --accent-l:   #7da0ff;
  --gold:       #e8c848;
  --gold-d:     #a08820;
  --green:      #34d399;
  --red:        #f87171;
  --cyan:       #67e8f9;
  --sold-out:   rgba(248,113,113,0.1);
  --font:       'Noto Sans JP', system-ui, sans-serif;
  --mono:       'JetBrains Mono', monospace;
  --radius:     8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent-l);text-decoration:none}a:hover{text-decoration:underline}
.wrap{max-width:1140px;margin:0 auto;padding:0 20px;position:relative;z-index:1}

/* ── Header ── */
header{padding:40px 0 28px;text-align:center}
header h1{font-size:1.5rem;font-weight:900;letter-spacing:.04em;color:var(--text)}

/* ── Search ── */
.search{display:flex;gap:8px;max-width:540px;margin:0 auto 36px;position:relative}
.search input{flex:1;padding:13px 18px;font:1rem var(--font);background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);outline:0;transition:border .2s}
.search input:focus{border-color:var(--border-hl)}
.search input::placeholder{color:var(--text-d)}
.search button{padding:13px 26px;font:.92rem var(--font);font-weight:700;background:var(--accent);color:#fff;border:0;border-radius:var(--radius);cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap}
.search button:hover{background:#5a88ff}
.search button:active{transform:scale(.97)}
.search button:disabled{background:var(--border);cursor:not-allowed}
.suggest-dropdown{position:absolute;top:100%;left:0;right:72px;background:var(--bg-card);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);max-height:280px;overflow-y:auto;z-index:100;display:none}
.suggest-dropdown.open{display:block}
.suggest-item{padding:10px 16px;font-size:.88rem;cursor:pointer;transition:background .1s;border-bottom:1px solid rgba(38,40,56,.5)}
.suggest-item:last-child{border-bottom:0}
.suggest-item:hover,.suggest-item.active{background:var(--bg-hover);color:var(--accent-l)}
.suggest-hint{padding:8px 16px;font-size:.72rem;color:var(--text-d);text-align:center}

/* ── Progress ── */
.shop-toggles{display:flex;gap:6px;max-width:540px;margin:-20px auto 20px;justify-content:center;flex-wrap:wrap}
.shop-toggle{display:flex;align-items:center;gap:5px;padding:6px 14px;font-size:.78rem;font-weight:600;color:var(--text-d);background:var(--bg-card);border:1.5px solid var(--border);border-radius:20px;cursor:pointer;transition:all .2s;user-select:none}
.shop-toggle input{display:none}
.shop-toggle.active{color:var(--text);border-color:var(--accent);background:rgba(74,124,255,.08)}
.shop-toggle:hover{border-color:var(--text-m)}
.progress{max-width:540px;margin:0 auto 28px;display:none;gap:8px}
.progress.on{display:flex}
.pstep{flex:1;padding:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;font-size:.78rem;text-align:center;transition:all .25s}
.pstep .pname{font-weight:700;display:block}
.pstep .pstat{font-size:.68rem;color:var(--text-d);margin-top:2px}
.pstep.searching{border-color:var(--accent);box-shadow:0 0 8px rgba(74,124,255,.12)}
.pstep.searching .pstat{color:var(--accent-l);animation:pulse 1.2s infinite}
.pstep.done{border-color:var(--green)}.pstep.done .pstat{color:var(--green)}
.pstep.error{border-color:var(--red)}.pstep.error .pstat{color:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Summary ── */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:28px}
.scard{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden}
.scard.best{border-color:var(--gold-d);background:rgba(232,200,72,.04)}
.scard.best::before{content:'BEST';position:absolute;top:10px;right:12px;font-size:.6rem;font-weight:700;color:var(--gold);letter-spacing:.08em;padding:2px 6px;border:1px solid var(--gold-d);border-radius:3px}
.scard .slabel{font-size:.68rem;font-weight:600;color:var(--text-m);text-transform:uppercase;letter-spacing:.1em}
.scard .sprice{font:600 1.5rem var(--mono);color:var(--gold);margin:5px 0 3px}
.scard .sprice a{color:var(--gold);text-decoration:none}
.scard .sprice a:hover{text-decoration:underline}
.scard .sdetail{font-size:.76rem;color:var(--text-m);line-height:1.5}
.scard .sdetail a{color:var(--text-m)}
.scard .sdetail a:hover{color:var(--accent-l)}

/* ── Controls row ── */
.controls{display:flex;gap:16px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.tabs{display:flex;gap:3px}
.tbtn{padding:8px 16px;font:.78rem var(--font);font-weight:700;color:var(--text-m);background:0;border:0;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.tbtn:hover{color:var(--text)}.tbtn.active{color:var(--accent-l);border-bottom-color:var(--accent)}
.toggle{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-m);cursor:pointer;user-select:none;margin-left:auto}
.toggle input{accent-color:var(--accent);width:15px;height:15px}
.count-badge{font:.68rem var(--mono);padding:2px 7px;border-radius:4px;background:rgba(255,82,82,.12);color:var(--red)}
.cache-badge{font:.68rem var(--mono);padding:2px 7px;border-radius:4px;background:rgba(108,92,231,.15);color:var(--accent-l)}
.tpanel{display:none;padding-top:12px}.tpanel.active{display:block}

/* ── Table ── */
.tbl-wrap{max-height:72vh;overflow-y:auto;border-radius:8px;border:1px solid var(--border)}
table.res{width:100%;border-collapse:collapse;font-size:.8rem}
table.res th{text-align:left;padding:9px 10px;font:.68rem var(--font);font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:2;cursor:pointer;user-select:none;white-space:nowrap}
table.res th:hover{color:var(--accent-l)}
table.res th .arr{font-size:.58rem;margin-left:2px}
table.res td{padding:8px 10px;border-bottom:1px solid rgba(37,37,64,.5);vertical-align:middle}
table.res tr:hover td{background:var(--bg-hover)}
table.res tr.sold-out td{opacity:.45}
table.res tr.sold-out .col-price{text-decoration:line-through;text-decoration-color:var(--red)}
.col-price{font:600 .82rem var(--mono);text-align:right;white-space:nowrap}
.col-stock{text-align:right;font:.76rem var(--mono);color:var(--text-m)}
.col-code{font:.73rem var(--mono);color:var(--text-d)}
.col-name a{color:var(--text);transition:color .15s}
.col-name a:hover{color:var(--accent-l)}

/* Rarity badge */
.rb{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.7rem;font-weight:700;white-space:nowrap;background:rgba(74,124,255,.1);color:var(--accent-l)}
.rb-ウルトラ,.rb-OFウルトラ{background:rgba(232,200,72,.1);color:var(--gold)}
.rb-スーパー{background:rgba(103,232,249,.08);color:#7dd4e8}
.rb-シークレット{background:rgba(180,170,230,.08);color:#b0a8e0}
.rb-プリシク{background:rgba(240,140,200,.08);color:#e8a0c8}
.rb-25thシークレット{background:rgba(100,200,240,.08);color:#70c8e8}
.rb-20thシークレット{background:rgba(200,160,80,.1);color:#c8a850}
.rb-アルティメット,.rb-エクシク{background:rgba(160,180,230,.08);color:#a0b8e0}
.rb-レア{background:rgba(100,190,120,.08);color:#78c088}
.rb-ノーマル,.rb-ノーマルパラレル{background:rgba(120,120,150,.1);color:var(--text-m)}
.rb-ミレニアム{background:rgba(200,170,100,.08);color:#c8a868}
.rb-ホログラフィック{background:rgba(180,180,220,.08);color:#b8b8e0}

/* Sold-out badge */
.sob{font:.65rem var(--font);padding:1px 5px;border-radius:3px;background:var(--sold-out);color:var(--red)}

/* Rarity grid */
.rarity-filter{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:12px;padding:10px 0}
.rf-label{font-size:.72rem;color:var(--text-d);margin-right:4px;white-space:nowrap}
.rf-btn{padding:3px 10px;font:.72rem var(--font);font-weight:600;color:var(--text-d);background:var(--bg-card);border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:all .15s;white-space:nowrap}
.rf-btn:hover{border-color:var(--text-m);color:var(--text-m)}
.rf-btn.active{color:var(--text);border-color:var(--accent);background:rgba(74,124,255,.08)}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.ritem{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;gap:10px;align-items:center;transition:border-color .2s}
.ritem:hover{border-color:var(--border-hl);background:var(--bg-hover)}
.ritem .rshop{font-size:.68rem;color:var(--text-m);margin-top:3px}
.ritem .rprice{font:600 .95rem var(--mono);color:var(--gold)}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(--text-d);font-size:.88rem}

/* Trending */
.trending{max-width:480px;margin:0 auto;text-align:left}
.trending-title{font-size:.82rem;font-weight:700;color:var(--text-m);margin-bottom:12px;text-align:center;letter-spacing:.05em}
.trending-list{display:flex;flex-direction:column;gap:4px}
.trending-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color .15s,background .15s}
.trending-item:hover{border-color:var(--accent);background:var(--bg-hover)}
.trending-rank{font:700 .82rem var(--mono);color:var(--text-d);min-width:20px}
.trending-name{flex:1;font-size:.88rem;font-weight:500}
.trending-count{font:.72rem var(--mono);color:var(--text-d)}

/* Fade */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fin{animation:fadeIn .3s ease-out both}
.hidden{display:none!important}

/* Card image */
.card-hero{display:flex;gap:20px;margin-bottom:20px;align-items:flex-start}
.card-hero-img{width:140px;flex-shrink:0;border-radius:6px;overflow:hidden;background:var(--bg-card);border:1px solid var(--border)}
.card-hero-img img{width:100%;height:auto;display:block}
.card-hero-info{flex:1;min-width:0}
.card-hero-name{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.card-hero-meta{font-size:.78rem;color:var(--text-m);line-height:1.6}
.ritem-img{width:36px;height:52px;border-radius:3px;overflow:hidden;flex-shrink:0;background:var(--bg-card)}
.ritem-img img{width:100%;height:100%;object-fit:cover}
.tbl-img{width:28px;height:40px;border-radius:2px;overflow:hidden;vertical-align:middle}
.tbl-img img{width:100%;height:100%;object-fit:cover}

/* Deck Builder */
.mode-tabs{display:flex;gap:4px;max-width:540px;margin:0 auto 20px;justify-content:center}
.mode-tab{padding:8px 20px;font:.82rem var(--font);font-weight:700;color:var(--text-d);background:var(--bg-card);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .15s}
.mode-tab:hover{border-color:var(--text-m);color:var(--text-m)}
.mode-tab.active{color:var(--text);border-color:var(--accent);background:rgba(74,124,255,.08)}
.deck-builder{max-width:800px;margin:0 auto}
.deck-input-area{margin-bottom:20px}
.deck-input-tabs{display:flex;gap:4px;margin-bottom:10px}
.deck-input-tab{padding:5px 12px;font:.72rem var(--font);font-weight:600;color:var(--text-d);background:none;border:1px solid var(--border);border-radius:4px;cursor:pointer}
.deck-input-tab.active{color:var(--accent-l);border-color:var(--accent)}
.deck-textarea{width:100%;min-height:120px;padding:12px;font:.85rem var(--font);background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);outline:0;resize:vertical}
.deck-textarea:focus{border-color:var(--border-hl)}
.deck-textarea::placeholder{color:var(--text-d)}
.deck-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.deck-btn{padding:10px 20px;font:.85rem var(--font);font-weight:700;border:none;border-radius:var(--radius);cursor:pointer;transition:background .15s}
.deck-btn-primary{background:var(--accent);color:#fff}.deck-btn-primary:hover{background:#5a88ff}
.deck-btn-secondary{background:var(--bg-card);color:var(--text-m);border:1px solid var(--border)}.deck-btn-secondary:hover{background:var(--bg-hover)}
.deck-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.deck-preset{padding:5px 12px;font:.75rem var(--font);font-weight:600;color:var(--text-m);background:var(--bg-card);border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:all .15s}
.deck-preset:hover{border-color:var(--accent);color:var(--text)}
.deck-results{margin-top:20px}
.deck-total{padding:16px;background:var(--bg-card);border:1px solid var(--gold-d);border-radius:var(--radius);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.deck-total-label{font-size:.85rem;color:var(--text-m)}
.deck-total-price{font:700 1.4rem var(--mono);color:var(--gold)}
.deck-card-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;font-size:.82rem}
.deck-card-qty{font:700 .82rem var(--mono);color:var(--accent-l);min-width:24px}
.deck-card-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.deck-card-price{font:600 .85rem var(--mono);color:var(--gold);white-space:nowrap}
.deck-card-shop{font-size:.72rem;color:var(--text-d);white-space:nowrap}
.deck-card-status{font-size:.7rem;color:var(--text-d)}
.deck-card-row.loading .deck-card-status{color:var(--accent-l);animation:pulse 1.2s infinite}
.deck-card-row.error .deck-card-name{color:var(--red)}
.deck-progress{font:.78rem var(--font);color:var(--text-m);margin-bottom:10px}

/* ── 環境デッキ プリセット ── */
.meta-loading{padding:24px;text-align:center;color:var(--text-d);font-size:.85rem}
.meta-tier-group{margin-bottom:16px}
.meta-tier-label{font:.7rem var(--font);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-d);margin-bottom:6px;padding-left:2px}
.meta-tier-label .tier-badge{display:inline-block;padding:1px 7px;border-radius:3px;color:#fff;font-weight:800;margin-right:6px;font-size:.7rem}
.tier-1{background:#e8444a}.tier-2{background:#e89844}.tier-3{background:#5898d8}.tier-4{background:#666}
.meta-deck-list{display:flex;flex-wrap:wrap;gap:6px}
.meta-deck-btn{padding:6px 14px;font:.78rem var(--font);font-weight:600;color:var(--text);background:var(--bg-card);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.meta-deck-btn:hover{border-color:var(--accent);background:var(--bg-hover)}
.meta-deck-btn.loading{opacity:.6;pointer-events:none}
.meta-deck-btn .meta-share{font:.65rem var(--mono);color:var(--text-d)}
.meta-deck-detail{margin-top:12px;padding:14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius)}
.meta-deck-detail h4{font-size:.85rem;margin-bottom:8px;color:var(--text)}
.meta-card-list{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.meta-card-chip{font:.72rem var(--font);padding:3px 8px;background:var(--bg-hover);border:1px solid var(--border);border-radius:4px;color:var(--text-m)}
.meta-card-chip .chip-qty{font-weight:700;color:var(--accent-l);margin-right:3px}
.meta-actions{display:flex;gap:8px;align-items:center}
.meta-note{font:.7rem var(--font);color:var(--text-d);margin-top:8px}

/* Mobile */
@media(max-width:640px){
  header h1{font-size:1.25rem}
  .search{flex-direction:column}.search button{width:100%}
  .summary{grid-template-columns:1fr}
  table.res{font-size:.72rem}
  table.res th,table.res td{padding:6px 7px}
  .controls{gap:8px}
  .card-hero{flex-direction:column;align-items:center;text-align:center}
  .card-hero-img{width:100px}
  .tbl-img{width:22px;height:32px}
  .deck-card-row{font-size:.75rem;gap:6px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>遊戯王OCG 価格比較</h1>
  </header>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="switchMode('search')">カード検索</button>
    <button class="mode-tab" onclick="switchMode('deck')">デッキ価格計算</button>
  </div>

  <!-- ===== 検索モード ===== -->
  <div id="mode-search">

  <div class="search">
    <input type="text" id="q" placeholder="カード名を入力（例: ブラック・マジシャン）" autofocus autocomplete="off">
    <button id="btn" onclick="doSearch()">検索</button>
    <div class="suggest-dropdown" id="suggestDrop"></div>
  </div>

  <div class="shop-toggles" id="shopToggles">
    <label class="shop-toggle active" data-shop="遊々亭">
      <input type="checkbox" checked> 遊々亭
    </label>
    <label class="shop-toggle active" data-shop="カードラッシュ">
      <input type="checkbox" checked> カードラッシュ
    </label>
    <label class="shop-toggle active" data-shop="トレコロCB">
      <input type="checkbox" checked> トレコロCB
    </label>
    <label class="shop-toggle active" data-shop="カーナベル">
      <input type="checkbox" checked> カーナベル
    </label>
  </div>

  <div class="progress" id="prog"></div>

  <div id="results" class="hidden">
    <div class="card-hero hidden" id="cardHero">
      <div class="card-hero-img" id="heroImgWrap"></div>
      <div class="card-hero-info" id="heroInfo"></div>
    </div>
    <div class="summary" id="sumCards"></div>

    <div class="controls">
      <div class="tabs">
        <button class="tbtn active" data-t="all" onclick="tab('all')">全件リスト</button>
        <button class="tbtn" data-t="rarity" onclick="tab('rarity')">レアリティ別</button>
      </div>
      <label class="toggle" id="soToggle">
        <input type="checkbox" id="soCheck" onchange="renderTable()">
        売り切れを表示
        <span class="count-badge" id="soCount">0</span>
      </label>
    </div>

    <div class="rarity-filter hidden" id="rarityFilter">
      <span class="rf-label">レアリティ:</span>
      <button class="rf-btn active" data-r="" onclick="setRarityFilter('')">すべて</button>
      <!-- 動的に追加される -->
    </div>

    <div class="tpanel active" id="p-all">
      <div class="tbl-wrap">
        <table class="res" id="tbl">
          <thead><tr>
            <th style="width:32px"></th>
            <th data-s="rarity">レアリティ<span class="arr"></span></th>
            <th data-s="name">カード名<span class="arr"></span></th>
            <th data-s="shop">店舗<span class="arr"></span></th>
            <th data-s="condition">状態<span class="arr"></span></th>
            <th data-s="price">価格<span class="arr">▲</span></th>
            <th data-s="stock">在庫<span class="arr"></span></th>
            <th data-s="code">コード<span class="arr"></span></th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="tpanel" id="p-rarity">
      <div class="rgrid" id="rgrid"></div>
    </div>
  </div>

  <div id="empty" class="empty">
    <p style="margin-bottom:24px">カード名を入力して検索</p>
    <div id="trendingSection" class="trending hidden">
      <h2 class="trending-title">注目カード</h2>
      <div class="trending-list" id="trendingList"></div>
    </div>
  </div>
  </div><!-- /mode-search -->

  <!-- ===== デッキ価格計算モード ===== -->
  <div id="mode-deck" class="hidden">
    <div class="deck-builder">

      <div class="deck-input-area">

        <!-- 入力方法タブ -->
        <div class="deck-input-tabs">
          <button class="deck-input-tab active" onclick="deckInputTab('paste')">テキスト</button>
          <button class="deck-input-tab" onclick="deckInputTab('preset')">環境デッキ</button>
        </div>

        <!-- テキスト入力 -->
        <div id="deckInput-paste">
          <textarea class="deck-textarea" id="deckTextarea" placeholder="カード名を入力（1行1枚、枚数指定も可）&#10;&#10;例:&#10;3 灰流うらら&#10;2 増殖するG&#10;1 サンダー・ボルト&#10;ブラック・マジシャン"></textarea>
        </div>

        <!-- ニューロン連携（未実装・非表示） -->
        <div id="deckInput-neuron" class="hidden">
          <textarea class="deck-textarea" id="neuronInput" placeholder="遊戯王ニューロンのデッキURLを貼り付け" disabled></textarea>
        </div>

        <!-- 環境デッキ（TCG PORTAL連携） -->
        <div id="deckInput-preset" class="hidden">
          <div id="metaTierList" class="meta-loading">環境データを読込中...</div>
          <div id="metaDeckDetail" class="meta-deck-detail hidden"></div>
        </div>

        <div class="deck-actions">
          <button class="deck-btn deck-btn-primary" onclick="calcDeck()">価格を計算</button>
          <button class="deck-btn deck-btn-secondary" onclick="clearDeck()">クリア</button>
        </div>
      </div>

      <!-- 計算結果 -->
      <div id="deckResults" class="deck-results hidden">
        <div class="deck-total">
          <span class="deck-total-label">デッキ合計最安値（推定）</span>
          <span class="deck-total-price" id="deckTotalPrice">-</span>
        </div>
        <div class="deck-progress" id="deckProgress"></div>
        <div id="deckCardList"></div>
      </div>

    </div>
  </div><!-- /mode-deck -->

</div>

<script>
let D=[],sort={k:'price',a:true},rarityFilter='',cardImgUrl='',cardImgSmall='';

// ── Card image: KONAMI公式DB (日本語版) + YGOProDeck fallback ──
function fetchCardImage(cardName){
  cardImgUrl='';cardImgSmall='';
  fetch('https://db.ygoprodeck.com/api/v7/cardinfo.php?name='+encodeURIComponent(cardName)+'&misc=yes&language=ja')
    .then(r=>r.json())
    .then(data=>{
      if(!data.data||!data.data[0]) return;
      const card=data.data[0];
      const imgs=card.card_images?card.card_images[0]:null;
      const konami_id=(card.misc_info&&card.misc_info[0])?card.misc_info[0].konami_id:null;

      // 英語版画像 (fallback用)
      const enImg=imgs?imgs.image_url:'';
      const enSmall=imgs?(imgs.image_url_small||imgs.image_url):'';

      if(konami_id){
        // KONAMI公式DB: 日本語版カード画像
        const jaImg='https://www.db.yugioh-card.com/yugiohdb/get_image.action?type=1&cid='+konami_id+'&request_locale=ja';
        cardImgUrl=jaImg;
        cardImgSmall=jaImg;
        _applyCardImages(jaImg,jaImg,enImg,enSmall);
      }else if(enImg){
        // konami_id がない場合は英語版で代替
        cardImgUrl=enImg;
        cardImgSmall=enSmall;
        _applyCardImages(enImg,enSmall,null,null);
      }
    })
    .catch(()=>{});
}

function _applyCardImages(heroSrc,thumbSrc,fallbackHero,fallbackThumb){
  // ヒーロー画像
  const wrap=document.getElementById('heroImgWrap');
  if(wrap&&heroSrc){
    const img=new Image();
    img.loading='lazy';
    img.onload=function(){wrap.innerHTML='';wrap.appendChild(img);};
    img.onerror=function(){
      // 日本語版が取得できなければ英語版にフォールバック
      if(fallbackHero){
        cardImgUrl=fallbackHero;cardImgSmall=fallbackThumb||fallbackHero;
        wrap.innerHTML='<img src="'+fallbackHero+'" alt="" loading="lazy">';
        _fillSmallImages(fallbackThumb||fallbackHero);
      }
    };
    img.src=heroSrc;
  }
  // サムネイル
  _fillSmallImages(thumbSrc);
}

function _fillSmallImages(src){
  if(!src)return;
  document.querySelectorAll('.ritem-img').forEach(function(el){
    el.innerHTML='<img src="'+src+'" alt="" loading="lazy">';
  });
  document.querySelectorAll('.tbl-img').forEach(function(el){
    el.innerHTML='<img src="'+src+'" alt="" loading="lazy">';
  });
}

// Shop toggle logic
document.querySelectorAll('.shop-toggle').forEach(label=>{
  label.addEventListener('click',e=>{
    e.preventDefault();
    const cb=label.querySelector('input');
    cb.checked=!cb.checked;
    label.classList.toggle('active',cb.checked);
  });
});

function getSelectedShops(){
  return [...document.querySelectorAll('.shop-toggle')]
    .filter(l=>l.querySelector('input').checked)
    .map(l=>l.dataset.shop);
}

function doSearch(){
  const q=document.getElementById('q').value.trim();
  if(!q)return;
  const shops=getSelectedShops();
  if(shops.length===0){
    alert('検索する店舗を1つ以上選択してください');
    return;
  }
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='検索中...';
  document.getElementById('results').classList.add('hidden');
  document.getElementById('empty').classList.add('hidden');

  // Build dynamic progress bar
  const prog=document.getElementById('prog');
  prog.innerHTML=shops.map(s=>
    `<div class="pstep" id="s-${s}"><span class="pname">${s}</span><span class="pstat">待機中</span></div>`
  ).join('');
  prog.style.display='flex';

  D=[];
  const params=new URLSearchParams({q});
  shops.forEach(s=>params.append('shops',s));

  const es=new EventSource('/api/search?'+params.toString());
  es.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==='progress'){
      const el=document.getElementById('s-'+d.shop);
      if(el){el.className='pstep searching';el.querySelector('.pstat').textContent='検索中...';}
    }else if(d.type==='shop_done'){
      const el=document.getElementById('s-'+d.shop);
      if(el){el.className='pstep done';el.querySelector('.pstat').textContent=d.count+'件'+(d.cached?' (cache)':'');}
    }else if(d.type==='shop_error'){
      const el=document.getElementById('s-'+d.shop);
      if(el){el.className='pstep error';el.querySelector('.pstat').textContent='エラー';}
    }else if(d.type==='done'){
      es.close();D=d.results;
      renderAll(d);
      btn.disabled=false;btn.textContent='検索';
      setTimeout(()=>{prog.style.display='none';},1200);
    }
  };
  es.onerror=()=>{
    es.close();btn.disabled=false;btn.textContent='検索';
    prog.style.display='none';
    document.getElementById('empty').classList.remove('hidden');
    document.getElementById('empty').innerHTML='<p>エラーが発生しました。再度お試しください。</p>';
  };
}
// ── Autocomplete ──
const qInput=document.getElementById('q');
const sugDrop=document.getElementById('suggestDrop');
let sugTimer=null, sugIdx=-1, sugItems=[];

qInput.addEventListener('input',()=>{
  clearTimeout(sugTimer);
  const v=qInput.value.trim();
  if(v.length<2){closeSuggest();return;}
  sugTimer=setTimeout(()=>fetchSuggest(v),250);
});

qInput.addEventListener('keydown',e=>{
  if(sugDrop.classList.contains('open')&&sugItems.length>0){
    if(e.key==='ArrowDown'){e.preventDefault();sugIdx=Math.min(sugIdx+1,sugItems.length-1);highlightSug();return;}
    if(e.key==='ArrowUp'){e.preventDefault();sugIdx=Math.max(sugIdx-1,-1);highlightSug();return;}
    if(e.key==='Enter'&&sugIdx>=0){e.preventDefault();selectSug(sugItems[sugIdx]);return;}
    if(e.key==='Escape'){closeSuggest();return;}
  }
  if(e.key==='Enter')doSearch();
});

qInput.addEventListener('blur',()=>{setTimeout(closeSuggest,150)});

function fetchSuggest(q){
  fetch('/api/suggest?q='+encodeURIComponent(q))
    .then(r=>r.json())
    .then(names=>{
      if(!names.length){closeSuggest();return;}
      sugItems=names;sugIdx=-1;
      sugDrop.innerHTML=names.map((n,i)=>
        `<div class="suggest-item" data-i="${i}" onmousedown="selectSug('${n.replace(/'/g,"\\'")}')">${esc(n)}</div>`
      ).join('');
      sugDrop.classList.add('open');
    })
    .catch(()=>closeSuggest());
}

function highlightSug(){
  sugDrop.querySelectorAll('.suggest-item').forEach((el,i)=>{
    el.classList.toggle('active',i===sugIdx);
  });
  if(sugIdx>=0){
    const el=sugDrop.children[sugIdx];
    if(el)el.scrollIntoView({block:'nearest'});
  }
}

function selectSug(name){
  qInput.value=name;
  closeSuggest();
  doSearch();
}

function closeSuggest(){sugDrop.classList.remove('open');sugIdx=-1;sugItems=[];}

function renderAll(d){
  document.getElementById('results').classList.remove('hidden');
  if(d.total===0){
    document.getElementById('results').innerHTML='<div class="empty"><p>該当するカードが見つかりませんでした</p></div>';
    return;
  }
  document.getElementById('soCount').textContent=d.sold_out_count;

  // Card hero image
  const searchTerm=document.getElementById('q').value.trim();
  const hero=document.getElementById('cardHero');
  const heroInfo=document.getElementById('heroInfo');
  hero.classList.remove('hidden');
  document.getElementById('heroImgWrap').innerHTML='<div style="width:140px;height:204px;background:var(--bg-card)"></div>';
  const inStock=D.filter(r=>!r.sold_out);
  const best=inStock.length>0?inStock.reduce((a,b)=>a.price<b.price?a:b):null;
  heroInfo.innerHTML=`<div class="card-hero-name">${esc(searchTerm)}</div>
    <div class="card-hero-meta">
      ${best?`最安値: <strong style="color:var(--gold);font-size:1.1rem">¥${best.price.toLocaleString()}</strong> (${best.shop})`:'在庫なし'}<br>
      在庫あり ${d.in_stock_count}件 / 売切 ${d.sold_out_count}件 / 計 ${d.total}件<br>
      レアリティ: ${[...new Set(D.map(r=>r.rarity).filter(Boolean))].length}種類
    </div>
    <button onclick="addToDeck('${searchTerm.replace(/'/g,"\\'")}')" style="margin-top:8px;padding:4px 12px;font:.72rem var(--font);font-weight:600;color:var(--accent-l);background:none;border:1px solid var(--accent);border-radius:4px;cursor:pointer">+ デッキに追加</button>`;
  fetchCardImage(searchTerm);

  // Summary
  let h='';
  if(best){
    const nameLink=best.url?`<a href="${esc(best.url)}" target="_blank" rel="noopener">${esc(best.name)}</a>`:esc(best.name);
    const priceLink=best.url?`<a href="${esc(best.url)}" target="_blank" rel="noopener">¥${best.price.toLocaleString()}</a>`:`¥${best.price.toLocaleString()}`;
    h+=`<div class="scard best fin"><div class="slabel">最安値</div>
      <div class="sprice">${priceLink}</div>
      <div class="sdetail">${best.shop} / ${best.rarity||'-'}<br>${nameLink}</div></div>`;
  }
  for(const[shop,item]of Object.entries(d.by_shop)){
    const nameLink=item.url?`<a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.name)}</a>`:esc(item.name);
    const priceLink=item.url?`<a href="${esc(item.url)}" target="_blank" rel="noopener">¥${item.price.toLocaleString()}</a>`:`¥${item.price.toLocaleString()}`;
    h+=`<div class="scard fin"><div class="slabel">${shop}</div>
      <div class="sprice">${priceLink}</div>
      <div class="sdetail">${item.rarity||'-'}<br>${nameLink}</div></div>`;
  }
  document.getElementById('sumCards').innerHTML=h;

  // Build rarity filter buttons
  rarityFilter='';
  const rarities=[...new Set(D.map(r=>r.rarity).filter(Boolean))].sort();
  const rfEl=document.getElementById('rarityFilter');
  if(rarities.length>1){
    rfEl.classList.remove('hidden');
    let btns='<span class="rf-label">レアリティ:</span><button class="rf-btn active" data-r="" onclick="setRarityFilter(\'\')">すべて</button>';
    for(const r of rarities){
      const cnt=D.filter(x=>x.rarity===r).length;
      btns+=`<button class="rf-btn" data-r="${esc(r)}" onclick="setRarityFilter('${r.replace(/'/g,"\\'")}')"><span class="rb rb-${r}" style="background:none;padding:0">${esc(r)}</span> <span style="color:var(--text-d)">${cnt}</span></button>`;
    }
    rfEl.innerHTML=btns;
  }else{
    rfEl.classList.add('hidden');
  }

  renderTable();

  // Rarity grid
  const entries=Object.entries(d.by_rarity).sort((a,b)=>a[1].price-b[1].price);
  document.getElementById('rgrid').innerHTML=entries.map(([r,item])=>{
    const link=item.url?`<a href="${esc(item.url)}" target="_blank" rel="noopener">¥${item.price.toLocaleString()}</a>`:`¥${item.price.toLocaleString()}`;
    return`<div class="ritem fin">
      <div class="ritem-img"></div>
      <div style="flex:1"><span class="rb rb-${r}">${r}</span><div class="rshop">${item.shop}</div></div>
      <div style="text-align:right"><div class="rprice">${link}</div></div></div>`;
  }).join('');
}

function renderTable(){
  const showSO=document.getElementById('soCheck').checked;
  let data=showSO?D:D.filter(r=>!r.sold_out);
  if(rarityFilter) data=data.filter(r=>r.rarity===rarityFilter);
  const sorted=[...data].sort((a,b)=>{
    let va=a[sort.k]??'',vb=b[sort.k]??'';
    if(typeof va==='number'&&typeof vb==='number')return sort.a?va-vb:vb-va;
    return sort.a?String(va).localeCompare(String(vb),'ja'):String(vb).localeCompare(String(va),'ja');
  });
  const tbody=document.getElementById('tbody');
  tbody.innerHTML=sorted.map(r=>{
    const rc=r.rarity?'rb-'+r.rarity:'';
    const so=r.sold_out?'sold-out':'';
    const stockStr=r.sold_out?'<span class="sob">売切</span>':(r.stock>0?r.stock:'-');
    const nameLink=r.url
      ?`<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.name)}</a>`
      :esc(r.name);
    const cond=r.condition==='セール'?'<span style="color:var(--gold)">セール</span>':esc(r.condition);
    return`<tr class="${so}">
      <td><div class="tbl-img"></div></td>
      <td><span class="rb ${rc}">${r.rarity||'-'}</span></td>
      <td class="col-name">${nameLink}</td>
      <td>${r.shop}</td>
      <td>${cond}</td>
      <td class="col-price">¥${r.price.toLocaleString()}</td>
      <td class="col-stock">${stockStr}</td>
      <td class="col-code">${r.code||''}</td></tr>`;
  }).join('');

  document.querySelectorAll('#tbl th').forEach(th=>{
    const arr=th.querySelector('.arr');
    if(arr) arr.textContent=th.dataset.s===sort.k?(sort.a?'▲':'▼'):'';
  });

  // Fill in card images if already loaded
  if(cardImgSmall){
    document.querySelectorAll('.tbl-img').forEach(el=>{
      if(!el.querySelector('img')) el.innerHTML=`<img src="${cardImgSmall}" alt="" loading="lazy">`;
    });
  }
}

document.querySelectorAll('#tbl th[data-s]').forEach(th=>{
  th.addEventListener('click',()=>{
    const k=th.dataset.s;
    if(sort.k===k)sort.a=!sort.a;
    else sort={k,a:k==='price'||k==='stock'};
    renderTable();
  });
});

function tab(id){
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('active',b.dataset.t===id));
  document.querySelectorAll('.tpanel').forEach(p=>p.classList.toggle('active',p.id==='p-'+id));
}

function setRarityFilter(r){
  rarityFilter=r;
  document.querySelectorAll('.rf-btn').forEach(b=>b.classList.toggle('active',b.dataset.r===r));
  renderTable();
}

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

// ── Trending ──
function loadTrending(){
  fetch('/api/trending?limit=10')
    .then(r=>r.json())
    .then(items=>{
      const sec=document.getElementById('trendingSection');
      const list=document.getElementById('trendingList');
      if(!items.length){sec.classList.add('hidden');return;}
      sec.classList.remove('hidden');
      list.innerHTML=items.map((item,i)=>
        `<div class="trending-item" onclick="searchCard('${item.name.replace(/'/g,"\\'")}')">
          <span class="trending-rank">${i+1}</span>
          <span class="trending-name">${esc(item.name)}</span>
          <span class="trending-count">${item.count}回</span>
        </div>`
      ).join('');
    })
    .catch(()=>{});
}

function searchCard(name){
  document.getElementById('q').value=name;
  doSearch();
}

// 初期ロード
loadTrending();

// ── Mode switch ──
function switchMode(mode){
  document.querySelectorAll('.mode-tab').forEach(b=>b.classList.toggle('active',b.textContent.includes(mode==='search'?'カード':'デッキ')));
  document.getElementById('mode-search').classList.toggle('hidden',mode!=='search');
  document.getElementById('mode-deck').classList.toggle('hidden',mode!=='deck');
}

// ── Deck Builder ──
function deckInputTab(id){
  document.querySelectorAll('.deck-input-tab').forEach(b=>b.classList.toggle('active',b.textContent.includes(
    id==='paste'?'テキスト':id==='neuron'?'ニューロン':'環境デッキ')));
  ['paste','neuron','preset'].forEach(t=>document.getElementById('deckInput-'+t).classList.toggle('hidden',t!==id));
  if(id==='preset') loadMetaTiers();
}

function parseDeckList(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const cards=[];
  for(const line of lines){
    const m=line.match(/^(\d+)\s+(.+)$/);
    if(m) cards.push({qty:parseInt(m[1]),name:m[2].trim()});
    else cards.push({qty:1,name:line});
  }
  return cards;
}

// ── 環境デッキ（TCG PORTAL連携）──
let _metaLoaded=false;
let _metaTiers=[];

async function loadMetaTiers(){
  if(_metaLoaded) return;
  const el=document.getElementById('metaTierList');
  el.innerHTML='<div class="meta-loading">環境データを読込中...</div>';
  try{
    const res=await fetch('/api/meta');
    _metaTiers=await res.json();
    _metaLoaded=true;
    renderMetaTiers();
  }catch(e){
    el.innerHTML='<div class="meta-loading">環境データの取得に失敗しました</div>';
  }
}

function renderMetaTiers(){
  const el=document.getElementById('metaTierList');
  if(!_metaTiers.length){el.innerHTML='<div class="meta-loading">データがありません</div>';return;}

  // グループ by tier
  const groups={};
  for(const t of _metaTiers){
    const key=t.tier||99;
    if(!groups[key]) groups[key]=[];
    groups[key].push(t);
  }

  let html='';
  for(const tier of Object.keys(groups).sort((a,b)=>a-b)){
    const label=tier<=4?`Tier ${tier}`:'Other';
    const cls=tier<=4?`tier-${tier}`:'tier-4';
    html+=`<div class="meta-tier-group">
      <div class="meta-tier-label"><span class="tier-badge ${cls}">${label}</span></div>
      <div class="meta-deck-list">`;
    for(const d of groups[tier]){
      const imgHtml=d.image?`<img src="${esc(d.image)}" alt="" style="width:22px;height:32px;border-radius:2px;object-fit:cover">`:'';
      html+=`<button class="meta-deck-btn" onclick="loadMetaDeck('${esc(d.name)}')" id="meta-btn-${esc(d.name)}">
        ${imgHtml} ${esc(d.name)} <span class="meta-share">${d.share}%</span>
      </button>`;
    }
    html+=`</div></div>`;
  }
  html+=`<div class="meta-note">データ: TCG PORTAL 大会入賞データより（直近1ヶ月）</div>`;
  el.innerHTML=html;
}

async function loadMetaDeck(theme){
  const detailEl=document.getElementById('metaDeckDetail');
  const btn=document.getElementById('meta-btn-'+theme);
  if(btn) btn.classList.add('loading');

  detailEl.classList.remove('hidden');
  detailEl.innerHTML='<div class="meta-loading">主要カードを読込中...</div>';

  try{
    const res=await fetch('/api/meta/deck?theme='+encodeURIComponent(theme));
    const data=await res.json();

    if(!data.cards||!data.cards.length){
      detailEl.innerHTML='<div class="meta-loading">「'+esc(theme)+'」の主要カードデータがありません</div>';
      return;
    }

    // デッキテキストを変数に保存
    _lastMetaDeckText=data.deck_text||'';

    // カードチップ表示（画像付き）
    let chips='';
    for(const c of data.cards){
      const qty=Math.round(c.avg)||1;
      const imgTag=c.image?'<img src="'+esc(c.image)+'" alt="" style="width:16px;height:23px;border-radius:1px;object-fit:cover;vertical-align:middle;margin-right:3px">':'';
      chips+='<span class="meta-card-chip">'+imgTag+'<span class="chip-qty">'+qty+'x</span>'+esc(c.name)+'</span>';
    }

    // レシピリンク
    let recipeHtml='';
    if(data.recipes&&data.recipes.length>0){
      recipeHtml='<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">'
        +'<div style="font:.72rem var(--font);color:var(--text-d);margin-bottom:6px">入賞デッキレシピ:</div>';
      for(const r of data.recipes){
        const label=r.title||'レシピを見る';
        const date=r.date?' ('+r.date+')':'';
        recipeHtml+='<a href="'+esc(r.url)+'" target="_blank" rel="noopener" style="display:inline-block;margin:2px 4px 2px 0;padding:3px 8px;font:.7rem var(--font);color:var(--accent-l);border:1px solid var(--border);border-radius:4px;text-decoration:none">'+esc(label)+date+'</a>';
      }
      recipeHtml+='</div>';
    }

    detailEl.innerHTML='<h4>'+esc(theme)+' — 主要カード（'+data.cards.length+'種）</h4>'
      +'<div class="meta-card-list">'+chips+'</div>'
      +'<div class="meta-actions">'
      +'<button class="deck-btn deck-btn-primary" onclick="applyMetaDeck()">この構成で価格計算</button>'
      +'<button class="deck-btn deck-btn-secondary" onclick="applyMetaDeckToTextarea()">テキストに反映</button>'
      +'</div>'
      +recipeHtml
      +'<div class="meta-note">採用率60%以上のカードを平均枚数で表示 / 手札誘発・汎用カード含む</div>';
  }catch(e){
    detailEl.innerHTML='<div class="meta-loading">読込に失敗しました</div>';
  }finally{
    if(btn) btn.classList.remove('loading');
  }
}

let _lastMetaDeckText='';

function applyMetaDeck(){
  document.getElementById('deckTextarea').value=_lastMetaDeckText;
  deckInputTab('paste');
  calcDeck();
}

function applyMetaDeckToTextarea(){
  document.getElementById('deckTextarea').value=_lastMetaDeckText;
  deckInputTab('paste');
}

// ── 旧プリセット（後方互換用・非表示）──
const PRESETS={};

function loadPreset(key){
  if(PRESETS[key]){
    document.getElementById('deckTextarea').value=PRESETS[key];
    deckInputTab('paste');
  }
}

function clearDeck(){
  document.getElementById('deckTextarea').value='';
  document.getElementById('deckResults').classList.add('hidden');
}

function addToDeck(name){
  const ta=document.getElementById('deckTextarea');
  const lines=ta.value.split('\n').filter(l=>l.trim());
  // Check if already in list
  const exists=lines.some(l=>{
    const m=l.match(/^(\d+)\s+(.+)$/);
    return (m?m[2].trim():l.trim())===name;
  });
  if(exists){
    // Increment quantity
    ta.value=lines.map(l=>{
      const m=l.match(/^(\d+)\s+(.+)$/);
      if(m&&m[2].trim()===name) return `${parseInt(m[1])+1} ${m[2].trim()}`;
      if(l.trim()===name) return `2 ${name}`;
      return l;
    }).join('\n');
  }else{
    lines.push(name);
    ta.value=lines.join('\n');
  }
  // Flash feedback
  switchMode('deck');
}

async function calcDeck(){
  const text=document.getElementById('deckTextarea').value;
  const cards=parseDeckList(text);
  if(!cards.length) return;

  const resultsEl=document.getElementById('deckResults');
  const listEl=document.getElementById('deckCardList');
  const totalEl=document.getElementById('deckTotalPrice');
  const progEl=document.getElementById('deckProgress');
  resultsEl.classList.remove('hidden');
  totalEl.textContent='計算中...';

  listEl.innerHTML=cards.map((c,i)=>`
    <div class="deck-card-row loading" id="deck-row-${i}">
      <span class="deck-card-qty">${c.qty}x</span>
      <span class="deck-card-name">${esc(c.name)}</span>
      <span class="deck-card-price">-</span>
      <span class="deck-card-shop"></span>
      <span class="deck-card-status">待機中</span>
    </div>`).join('');

  // Build request
  const shops=getSelectedShops();
  const cardsParam=cards.map(c=>c.qty>1?`${c.qty} ${c.name}`:c.name).join('|');
  const params=new URLSearchParams({cards:cardsParam});
  shops.forEach(s=>params.append('shops',s));

  let total=0,found=0,notFound=0;

  try{
    const res=await fetch('/api/deck?'+params.toString());
    const reader=res.body.getReader();
    const decoder=new TextDecoder();
    let buffer='';

    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const chunks=buffer.split('\n\n');
      buffer=chunks.pop()||'';

      for(const chunk of chunks){
        if(!chunk.startsWith('data: '))continue;
        const d=JSON.parse(chunk.slice(6));

        if(d.type==='card_start'){
          const row=document.getElementById('deck-row-'+d.index);
          if(row){row.className='deck-card-row loading';row.querySelector('.deck-card-status').textContent='検索中...';}
          progEl.textContent=`${d.index+1}/${cards.length} 検索中...`;
        }
        else if(d.type==='card_done'){
          const c=cards[d.index];
          const row=document.getElementById('deck-row-'+d.index);
          if(!row)continue;

          if(d.best){
            const unitPrice=d.best.price;
            const lineTotal=unitPrice*c.qty;
            total+=lineTotal;
            found++;
            row.className='deck-card-row';
            row.querySelector('.deck-card-price').textContent=`¥${lineTotal.toLocaleString()}`;
            row.querySelector('.deck-card-shop').textContent=d.best.shop;
            row.querySelector('.deck-card-status').textContent=c.qty>1?`@¥${unitPrice.toLocaleString()}`:'';
            row.querySelector('.deck-card-name').innerHTML=d.best.url
              ?`<a href="${esc(d.best.url)}" target="_blank" rel="noopener">${esc(c.name)}</a>`
              :esc(c.name);
          }else{
            notFound++;
            row.className='deck-card-row error';
            row.querySelector('.deck-card-status').textContent='見つかりません';
          }
          totalEl.textContent=`¥${total.toLocaleString()}`;
        }
        else if(d.type==='done'){
          progEl.textContent=`完了 — ${found}/${cards.length}枚の価格を取得${notFound>0?` (${notFound}枚未取得)`:''}`;
        }
      }
    }
  }catch(e){
    progEl.textContent='エラーが発生しました。再度お試しください。';
  }
}
</script>
