<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ロゴ比較</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&family=Outfit:wght@600;700;800&family=Montserrat:wght@700;800;900&family=Oxanium:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0e14;--bg-card:#141620;--border:#262838;--text:rgba(255,255,255,.7);--hl:#fff;--accent-l:#7da0ff;--gold:#e8c848}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:#d8dae0;min-height:100vh;padding:32px 20px;background-image:radial-gradient(ellipse at 50% 0%,rgba(74,124,255,.06) 0%,transparent 60%)}
h2{font-size:1rem;font-weight:700;color:var(--accent-l);margin:32px 0 8px;text-align:center}
h2:first-of-type{margin-top:0}
.desc{text-align:center;font-size:.8rem;color:#555670;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;max-width:1000px;margin:0 auto 24px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:24px 20px;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:var(--accent-l);box-shadow:0 0 0 2px rgba(74,124,255,.15)}
.card.selected{border-color:var(--gold);box-shadow:0 0 0 2px rgba(232,200,72,.2)}
.label{font-size:.72rem;color:#8a8ca0;margin-bottom:10px;font-family:'Noto Sans JP',sans-serif;letter-spacing:.04em}
.tag{display:inline-block;font-size:.6rem;color:#555670;background:rgba(255,255,255,.05);padding:2px 8px;border-radius:10px;margin-left:6px}
.logo-preview{display:flex;align-items:center;gap:10px}
.logo-preview svg{width:38px;height:38px;flex-shrink:0}
.logo-text{display:flex;flex-direction:column;align-items:flex-start;line-height:1.1}
.logo-main{font-size:1.7rem;letter-spacing:.04em;color:var(--text)}
.logo-main .hl{color:var(--hl)}
.logo-sub{font-size:.7rem;font-weight:700;color:var(--accent-l);letter-spacing:.12em;margin-top:2px;font-family:'Noto Sans JP',sans-serif}
.current{position:relative}
.current::after{content:'現在';position:absolute;top:8px;right:12px;font-size:.65rem;color:var(--gold);border:1px solid var(--gold);padding:1px 8px;border-radius:10px;font-family:'Noto Sans JP',sans-serif}
</style>
</head>
<body>

<h2>フォント比較</h2>
<p class="desc">クリックで枠が光ります</p>
<div class="grid" id="fontGrid"></div>

<h2>SVGアイコン配色比較</h2>
<p class="desc">フォントは Outfit ExtraBold で統一。遊戯王カード裏面モチーフ + 旧デザイン比較用</p>
<div class="grid" id="colorGrid"></div>

<script>
var SVG_BASE='<svg viewBox="0 0 100 100"><rect x="8" y="12" width="50" height="72" rx="5" fill="C1" stroke="S1" stroke-width="3"/><rect x="42" y="16" width="50" height="72" rx="5" fill="C2" stroke="S2" stroke-width="3"/><text x="67" y="62" font-size="28" font-weight="bold" fill="TXT" text-anchor="middle" font-family="Arial">¥</text></svg>';

function makeSvg(c1,c2,s1,s2,txt){
  return SVG_BASE.replace('C1',c1).replace('C2',c2).replace('S1',s1||'#fff').replace('S2',s2||'#fff').replace('TXT',txt||'#fff');
}

function makeCard(parent,label,tag,svg,fontFamily,fontWeight,isCurrent){
  var card=document.createElement('div');
  card.className='card'+(isCurrent?' current':'');
  card.innerHTML='<div class="label">'+label+'<span class="tag">'+tag+'</span></div>'
    +'<div class="logo-preview">'+svg
    +'<span class="logo-text">'
    +'<span class="logo-main" style="font-family:\''+fontFamily+'\',sans-serif;font-weight:'+fontWeight+'"><span class="hl">Ca</span>rd<span class="hl">Pri</span>ce i<span class="hl">s</span>?</span>'
    +'<span class="logo-sub">遊戯王OCG 価格比較</span>'
    +'</span></div>';
  card.addEventListener('click',function(){
    var cards=parent.querySelectorAll('.card');
    cards.forEach(function(c){c.classList.remove('selected')});
    card.classList.add('selected');
  });
  parent.appendChild(card);
}

// フォント比較
var fontGrid=document.getElementById('fontGrid');
var defaultSvg=makeSvg('#4a7cff','#e8c848');
var fonts=[
  {name:'Noto Sans JP',weight:900,tag:'現在',current:true},
  {name:'Outfit',weight:800,tag:'ExtraBold'},
  {name:'Outfit',weight:700,tag:'Bold'},
  {name:'Outfit',weight:600,tag:'SemiBold'},
  {name:'Montserrat',weight:900,tag:'Black'},
  {name:'Montserrat',weight:800,tag:'ExtraBold'},
  {name:'Montserrat',weight:700,tag:'Bold'},
  {name:'Oxanium',weight:800,tag:'ExtraBold'},
  {name:'Oxanium',weight:700,tag:'Bold'},
  {name:'Oxanium',weight:600,tag:'SemiBold'},
];
fonts.forEach(function(f){
  makeCard(fontGrid,f.name,f.tag,defaultSvg,f.name,f.weight,f.current);
});

// 遊戯王カード裏面モチーフのSVG生成
// カード型 + 中央に縦長楕円（渦）+ ¥マーク
function makeYugiohSvg(bg,border,oval,ovalStroke,txt,rbg,rborder){
  return '<svg viewBox="0 0 100 100">'
    // 左カード（裏面モチーフ）
    +'<rect x="6" y="10" width="52" height="76" rx="4" fill="'+bg+'" stroke="'+(border||'#2a1a0a')+'" stroke-width="2"/>'
    +'<rect x="11" y="15" width="42" height="66" rx="2" fill="none" stroke="'+(border||'#2a1a0a')+'" stroke-width="1" opacity=".5"/>'
    +'<ellipse cx="32" cy="48" rx="14" ry="22" fill="'+(oval||'#1a0e04')+'" stroke="'+(ovalStroke||'#8B6914')+'" stroke-width="1.5"/>'
    +'<ellipse cx="32" cy="48" rx="8" ry="15" fill="none" stroke="'+(ovalStroke||'#8B6914')+'" stroke-width="1" opacity=".6"/>'
    // 右カード（¥マーク）
    +'<rect x="42" y="14" width="52" height="76" rx="4" fill="'+(rbg||bg)+'" stroke="'+(rborder||border||'#2a1a0a')+'" stroke-width="2"/>'
    +'<text x="68" y="62" font-size="28" font-weight="bold" fill="'+(txt||'#fff')+'" text-anchor="middle" font-family="Arial">¥</text>'
    +'</svg>';
}

// 配色比較（遊戯王カード裏面モチーフ）
var colorGrid=document.getElementById('colorGrid');
var yugiColors=[
  // 左右同色（前回のもの）
  {name:'左右同色: ダークブラウン+金渦',tag:'裏面に忠実',bg:'#5C3317',border:'#3a1e0a',oval:'#1a0e04',ovalS:'#8B6914',txt:'#d4a932'},
  {name:'左右同色: ダークブラウン+ブルー渦',tag:'サイトと統一',bg:'#4A2A14',border:'#2a1608',oval:'#0a0e1a',ovalS:'#4a7cff',txt:'#7da0ff'},
  {name:'左右同色: ネイビー+金渦',tag:'品格',bg:'#1a2744',border:'#0e1830',oval:'#060e1a',ovalS:'#C49B2A',txt:'#C49B2A'},

  // 右カード: ネイビー系
  {name:'右ネイビー',tag:'知的・信頼',bg:'#5C3317',border:'#3a1e0a',oval:'#1a0e04',ovalS:'#8B6914',txt:'#c0cfe0',rbg:'#1a2744',rb:'#0e1830'},
  {name:'右ダークネイビー',tag:'深み',bg:'#5C3317',border:'#3a1e0a',oval:'#1a0e04',ovalS:'#8B6914',txt:'#8aacd0',rbg:'#0f1b33',rb:'#1a2744'},

  // 縁取り白系バリエーション
  {name:'右ネイビー 白縁',tag:'くっきり',bg:'#5C3317',border:'#e8e0d0',oval:'#1a0e04',ovalS:'#8B6914',txt:'#c0cfe0',rbg:'#1a2744',rb:'#e8e0d0'},
  {name:'右ネイビー クリーム縁',tag:'やわらかい',bg:'#5C3317',border:'#d4c8a8',oval:'#1a0e04',ovalS:'#8B6914',txt:'#c0cfe0',rbg:'#1a2744',rb:'#d4c8a8'},
  {name:'右ネイビー シルバー縁',tag:'洗練',bg:'#5C3317',border:'#b0b8c4',oval:'#1a0e04',ovalS:'#8B6914',txt:'#c0cfe0',rbg:'#1a2744',rb:'#b0b8c4'},
  {name:'右ネイビー 純白縁',tag:'コントラスト強',bg:'#5C3317',border:'#ffffff',oval:'#1a0e04',ovalS:'#8B6914',txt:'#c0cfe0',rbg:'#1a2744',rb:'#ffffff'},

  // 右カード: ブルー系
  {name:'右インディゴ',tag:'サイト色と統一',bg:'#5C3317',border:'#3a1e0a',oval:'#1a0e04',ovalS:'#8B6914',txt:'#7da0ff',rbg:'#1a2550',rb:'#283593'},
  {name:'右スレート',tag:'落ち着き',bg:'#5C3317',border:'#3a1e0a',oval:'#1a0e04',ovalS:'#8B6914',txt:'#b0c4d8',rbg:'#37474f',rb:'#263238'},

  // 右カード: ダーク系
  {name:'右チャコール',tag:'モダン',bg:'#5C3317',border:'#3a1e0a',oval:'#1a0e04',ovalS:'#8B6914',txt:'#d4a932',rbg:'#1e1e1e',rb:'#333'},
  {name:'右ダークグレー',tag:'シンプル',bg:'#5C3317',border:'#3a1e0a',oval:'#1a0e04',ovalS:'#8B6914',txt:'#e0e0e0',rbg:'#2a2a2a',rb:'#444'},

  // 右カード: ティール・シアン系
  {name:'右ダークティール',tag:'クール',bg:'#5C3317',border:'#3a1e0a',oval:'#1a0e04',ovalS:'#8B6914',txt:'#4dd0c8',rbg:'#1a3a38',rb:'#0e2826'},
  {name:'右ディープシアン',tag:'爽やか',bg:'#5C3317',border:'#3a1e0a',oval:'#1a0e04',ovalS:'#8B6914',txt:'#26c6da',rbg:'#0e2a30',rb:'#164550'},

  // 右カード: パープル系
  {name:'右ダークパープル',tag:'ミスティック',bg:'#5C3317',border:'#3a1e0a',oval:'#1a0e04',ovalS:'#8B6914',txt:'#c8a0e8',rbg:'#2a1840',rb:'#1a0e28'},

  // 右カード: 同系の別トーン
  {name:'右ダークブラウン(濃)',tag:'統一感',bg:'#5C3317',border:'#3a1e0a',oval:'#1a0e04',ovalS:'#8B6914',txt:'#d4a932',rbg:'#3a1e0a',rb:'#2a1408'},
  {name:'右ボルドー',tag:'高級感',bg:'#5C3317',border:'#3a1e0a',oval:'#1a0e04',ovalS:'#8B6914',txt:'#e0c0a0',rbg:'#4a1020',rb:'#2a0810'},
];
yugiColors.forEach(function(c){
  var svg=makeYugiohSvg(c.bg,c.border,c.oval,c.ovalS,c.txt,c.rbg,c.rb);
  makeCard(colorGrid,c.name,c.tag,svg,'Outfit',800,false);
});
</script>
</body>
</html>
